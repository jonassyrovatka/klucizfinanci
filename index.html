<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kluci z financí</title>
    
    <!-- Tailwind CSS přes CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vlastní fonty (lokální načítání) -->
    <style>
        @font-face {
            font-family: 'Nexa';
            src: url('Nexa-Trial-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'TT Travels Next';
            src: url('TT Travels Next Trial DemiBold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        .font-syne { font-family: 'TT Travels Next', sans-serif; }
        .font-poppins { font-family: 'Nexa', sans-serif; }
        ::selection { background-color: #F9E900; color: #080708; }
        html { scroll-behavior: smooth; }
    </style>
    
    <!-- React a ReactDOM přes CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pro překlad JSX v prohlížeči -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .font-syne { font-family: 'Syne', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        ::selection { background-color: #F9E900; color: #080708; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#fafafa] text-[#080708] font-poppins">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IKONY (přepsané z lucide-react do SVG komponent pro bezproblémové fungování) ---
        const Icon = ({ d, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d}
            </svg>
        );
        const Menu = ({size}) => <Icon size={size} d={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} />;
        const X = ({size}) => <Icon size={size} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const ArrowRight = ({size, className}) => <Icon size={size} className={className} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
        const TrendingUp = ({size, className}) => <Icon size={size} className={className} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />;
        const ShieldCheck = ({size, className}) => <Icon size={size} className={className} d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>} />;
        const Users = ({size, className}) => <Icon size={size} className={className} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const Phone = ({size, className}) => <Icon size={size} className={className} d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>} />;
        const Mail = ({size, className}) => <Icon size={size} className={className} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>} />;
        const CheckCircle2 = ({size, className}) => <Icon size={size} className={className} d={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
        const Linkedin = ({size}) => <Icon size={size} d={<><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></>} />;
        const Facebook = ({size}) => <Icon size={size} d={<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>} />;
        const Instagram = ({size}) => <Icon size={size} d={<><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></>} />;

        // --- HLAVNÍ APLIKACE ---
        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [formStatus, setFormStatus] = useState('idle');

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setFormStatus('submitting');
                setTimeout(() => {
                    setFormStatus('success');
                }, 1000);
            };

            const scrollToSection = (id) => {
                setIsMenuOpen(false);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div>
                    {/* Navigace */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center">
                                <div className="flex-shrink-0 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                    <img src="logo_color-dark_long.svg" alt="Kluci z financí" className="h-14 md:h-16 lg:h-20 w-auto transition-all" />
                                </div>
                                
                                {/* Desktop Menu */}
                                <div className="hidden md:flex items-center space-x-8">
                                    <button onClick={() => scrollToSection('sluzby')} className="text-[#080708] hover:text-[#01ABBD] font-medium transition-colors">Naše služby</button>
                                    <button onClick={() => scrollToSection('tym')} className="text-[#080708] hover:text-[#01ABBD] font-medium transition-colors">Náš tým</button>
                                    <button onClick={() => scrollToSection('kariera')} className="text-[#080708] hover:text-[#01ABBD] font-medium transition-colors">Kariéra</button>
                                    <button onClick={() => scrollToSection('kontakt')} className="bg-[#080708] text-white px-6 py-2.5 rounded-full font-medium hover:bg-[#01ABBD] transition-all transform hover:scale-105">
                                        Ozvěte se nám
                                    </button>
                                </div>

                                {/* Mobile Menu Button */}
                                <div className="md:hidden flex items-center">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-[#080708]">
                                        {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu Dropdown */}
                        {isMenuOpen && (
                            <div className="md:hidden absolute top-full left-0 w-full bg-white shadow-lg py-4 px-4 flex flex-col space-y-4">
                                <button onClick={() => scrollToSection('sluzby')} className="text-left text-lg font-medium text-[#080708]">Naše služby</button>
                                <button onClick={() => scrollToSection('tym')} className="text-left text-lg font-medium text-[#080708]">Náš tým</button>
                                <button onClick={() => scrollToSection('kariera')} className="text-left text-lg font-medium text-[#080708]">Kariéra</button>
                                <button onClick={() => scrollToSection('kontakt')} className="text-left text-lg font-medium text-[#01ABBD]">Ozvěte se nám</button>
                            </div>
                        )}
                    </nav>

                    {/* Hero Sekce */}
                    <section className="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden">
                        <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-[#01ABBD] rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse"></div>
                        <div className="absolute top-40 left-0 -ml-20 w-72 h-72 bg-[#F9E900] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                        
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                <div>
                                    <div className="inline-flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-sm mb-6 border border-gray-100">
                                        <span className="w-2 h-2 rounded-full bg-[#01ABBD] animate-pulse"></span>
                                        <span className="text-sm font-semibold text-[#080708] tracking-wide uppercase">Společně silní, individuálně precizní</span>
                                    </div>
                                    <h1 className="font-syne text-5xl md:text-6xl lg:text-7xl font-extrabold text-[#080708] leading-tight mb-6">
                                        S námi Vaše peníze <span className="text-[#01ABBD]">rostou.</span>
                                        <br />Srdcem i rozumem.
                                    </h1>
                                    <p className="text-lg md:text-xl text-gray-600 mb-8 max-w-lg leading-relaxed">
                                        Vaši průvodci ve světě osobních a firemních financí. Lidsky, autenticky a přátelsky Vám pomůžeme dělat chytrá rozhodnutí.
                                    </p>
                                    <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                                        <button onClick={() => scrollToSection('kontakt')} className="bg-[#01ABBD] text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-[#0193a3] transition-all flex items-center justify-center group shadow-lg shadow-cyan-500/30">
                                            Začít spolupráci
                                            <ArrowRight className="ml-2 group-hover:translate-x-1 transition-transform" size={20} />
                                        </button>
                                        <button onClick={() => scrollToSection('sluzby')} className="bg-white text-[#080708] px-8 py-4 rounded-full font-semibold text-lg hover:bg-gray-50 transition-all border border-gray-200 flex items-center justify-center">
                                            Zjistit více
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="relative hidden lg:block">
                                    <div className="absolute inset-0 bg-gradient-to-tr from-[#01ABBD] to-[#F9E900] rounded-[3rem] transform rotate-3 opacity-20"></div>
                                    <img src="symbol_color-dark.svg" alt="Kluci z financí Symbol" className="relative z-10 w-full max-w-md mx-auto p-12 bg-white rounded-[3rem] shadow-xl border border-gray-100" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Služby */}
                    <section id="sluzby" className="py-20 bg-white relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="font-syne text-4xl md:text-5xl font-bold text-[#080708] mb-4">S čím Vám pomůžeme?</h2>
                                <p className="text-lg text-gray-600 max-w-2xl mx-auto">Zakládáme si na hloubkové znalosti trhu a individuálním přístupu ke každému klientovi.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {/* Služba 1 */}
                                <div className="bg-[#fafafa] p-8 rounded-3xl border border-gray-100 hover:shadow-xl transition-all group">
                                    <div className="w-14 h-14 bg-[#01ABBD] bg-opacity-10 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <TrendingUp className="text-[#01ABBD]" size={28} />
                                    </div>
                                    <h3 className="font-syne text-2xl font-bold mb-4">Investice a hypotéky</h3>
                                    <p className="text-gray-600 mb-6">
                                        Najdeme pro Vás to nejlepší řešení na trhu. Ať už plánujete vlastní bydlení nebo chcete chytře zhodnotit své úspory s ohledem na riziko a výnos.
                                    </p>
                                </div>

                                {/* Služba 2 */}
                                <div className="bg-[#fafafa] p-8 rounded-3xl border border-gray-100 hover:shadow-xl transition-all group">
                                    <div className="w-14 h-14 bg-[#F9E900] bg-opacity-20 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <ShieldCheck className="text-[#080708]" size={28} />
                                    </div>
                                    <h3 className="font-syne text-2xl font-bold mb-4">Sportovci a podnikatelé</h3>
                                    <p className="text-gray-600 mb-6">
                                        Rozumíme specifickým potřebám dynamického světa. Plánujeme cashflow pro sezónu i období mimo ni a zajistíme Vaši budoucnost po kariéře.
                                    </p>
                                </div>

                                {/* Služba 3 */}
                                <div className="bg-[#080708] p-8 rounded-3xl text-white hover:shadow-xl transition-all group relative overflow-hidden" id="kariera">
                                    <div className="absolute -right-10 -top-10 w-32 h-32 bg-[#F9E900] rounded-full opacity-10"></div>
                                    <div className="w-14 h-14 bg-white bg-opacity-10 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <Users className="text-[#F9E900]" size={28} />
                                    </div>
                                    <h3 className="font-syne text-2xl font-bold mb-4">Kariéra a mentoring</h3>
                                    <p className="text-gray-400 mb-6">
                                        Hledáte kariérní růst a podporu? Budujeme tým na přátelských vztazích, vzájemném respektu a oceňování. Od nováčka k expertovi.
                                    </p>
                                    <button onClick={() => scrollToSection('kontakt')} className="text-[#F9E900] font-semibold flex items-center hover:underline">
                                        Přidat se k nám <ArrowRight className="ml-2" size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Tým */}
                    <section id="tym" className="py-20 bg-[#fafafa]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="font-syne text-4xl md:text-5xl font-bold text-[#080708] mb-4">Seznamte se s Kluky z financí</h2>
                                <p className="text-lg text-gray-600 max-w-2xl mx-auto">Tým nadšených expertů. Spojuje nás hluboká odbornost, znalost trhu a neutuchající touha Vám pomáhat růst.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {/* Jonáš */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">
                                    <div className="relative h-80 overflow-hidden bg-gray-200">
                                        <img src="Jonas 02.jpg" alt="Jonáš Syrovátka" className="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                    </div>
                                    <div className="p-8 relative">
                                        <div className="absolute -top-6 right-8 bg-[#01ABBD] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
                                            <span className="font-syne font-bold text-xl">J</span>
                                        </div>
                                        <h3 className="font-syne text-2xl font-bold mb-1">Jonáš Syrovátka</h3>
                                        <p className="text-[#01ABBD] font-medium mb-4">Expert na produkty</p>
                                        <p className="text-gray-600 text-sm">
                                            Vaše finance, Vaše radost. Specializuje se na hloubkovou analýzu trhu, hypotéky, investice a komplexní pojištění. Najde pro Vás řešení.
                                        </p>
                                    </div>
                                </div>

                                {/* Vojtěch */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">
                                    <div className="relative h-80 overflow-hidden bg-gray-200">
                                        <img src="Vojta 02.jpg" alt="Vojtěch Vencl" className="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                    </div>
                                    <div className="p-8 relative">
                                        <div className="absolute -top-6 right-8 bg-[#F9E900] text-[#080708] w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
                                            <span className="font-syne font-bold text-xl">V</span>
                                        </div>
                                        <h3 className="font-syne text-2xl font-bold mb-1">Vojtěch Vencl</h3>
                                        <p className="text-[#01ABBD] font-medium mb-4">Mentor a leader</p>
                                        <p className="text-gray-600 text-sm">
                                            Odborník na budování týmu a podnikatelské know-how. Zakládá si na transparentnosti, sdílí úspěchy i cenné zkušenosti z praxe pro maximální autenticitu.
                                        </p>
                                    </div>
                                </div>

                                {/* Viktor */}
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">
                                    <div className="relative h-80 overflow-hidden bg-gray-200">
                                        <img src="Viktor 02.jpg" alt="Viktor Vencl" className="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                    </div>
                                    <div className="p-8 relative">
                                        <div className="absolute -top-6 right-8 bg-[#080708] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
                                            <span className="font-syne font-bold text-xl">V</span>
                                        </div>
                                        <h3 className="font-syne text-2xl font-bold mb-1">Viktor Vencl</h3>
                                        <p className="text-[#01ABBD] font-medium mb-4">Specialista na sportovce</p>
                                        <p className="text-gray-600 text-sm">
                                            Propojuje svět byznysu a sportu. Řeší unikátní finanční plánování během aktivní kariéry i bezpečný přechod do života po ní. Osobní strategie na míru.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Kontakt / Formulář */}
                    <section id="kontakt" className="py-20 bg-white relative overflow-hidden">
                        <div className="absolute right-0 bottom-0 opacity-5 pointer-events-none transform translate-x-1/4 translate-y-1/4">
                            <img src="symbol_color-dark.svg" alt="" className="w-[800px]" />
                        </div>
                        
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="bg-[#080708] rounded-[3rem] p-8 md:p-16 text-white shadow-2xl">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                                    {/* Info */}
                                    <div>
                                        <h2 className="font-syne text-4xl md:text-5xl font-bold mb-6">Pojďme se o tom pobavit</h2>
                                        <p className="text-gray-300 text-lg mb-10">
                                            Zanechte nám na sebe kontakt. Ať už chcete řešit hypotéku, investice, kariéru nebo se jen poradit, ozveme se Vám co nejdříve.
                                        </p>
                                        
                                        <div className="space-y-6">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-12 h-12 bg-[#01ABBD] bg-opacity-20 rounded-full flex items-center justify-center">
                                                    <Phone className="text-[#01ABBD]" size={24} />
                                                </div>
                                                <div>
                                                    <p className="text-sm text-gray-400">Zavolejte nám</p>
                                                    <a href="tel:+420777123456" className="text-xl font-semibold hover:text-[#01ABBD] transition-colors">+420 777 123 456</a>
                                                </div>
                                            </div>
                                            
                                            <div className="flex items-center space-x-4">
                                                <div className="w-12 h-12 bg-[#F9E900] bg-opacity-20 rounded-full flex items-center justify-center">
                                                    <Mail className="text-[#F9E900]" size={24} />
                                                </div>
                                                <div>
                                                    <p className="text-sm text-gray-400">Napište nám</p>
                                                    <a href="mailto:info@klucizfinanci.cz" className="text-xl font-semibold hover:text-[#F9E900] transition-colors">info@klucizfinanci.cz</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Formulář */}
                                    <div className="bg-white rounded-3xl p-8 text-[#080708]">
                                        {formStatus === 'success' ? (
                                            <div className="h-full flex flex-col items-center justify-center text-center space-y-4 py-10">
                                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
                                                    <CheckCircle2 className="text-green-500" size={40} />
                                                </div>
                                                <h3 className="font-syne text-2xl font-bold">Děkujeme!</h3>
                                                <p className="text-gray-600">Vaše zpráva byla úspěšně odeslána. Brzy se Vám ozveme zpět.</p>
                                                <button onClick={() => setFormStatus('idle')} className="mt-4 text-[#01ABBD] font-medium hover:underline">
                                                    Poslat další zprávu
                                                </button>
                                            </div>
                                        ) : (
                                            <form onSubmit={handleFormSubmit} className="space-y-5">
                                                <div>
                                                    <label htmlFor="name" className="block text-sm font-medium text-gray-700 mb-1">Jméno a příjmení</label>
                                                    <input type="text" id="name" required className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#01ABBD] focus:border-transparent outline-none transition-all" placeholder="Jan Novák" />
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                    <div>
                                                        <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                                                        <input type="email" id="email" required className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#01ABBD] focus:border-transparent outline-none transition-all" placeholder="jan@novak.cz" />
                                                    </div>
                                                    <div>
                                                        <label htmlFor="phone" className="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                                                        <input type="tel" id="phone" required className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#01ABBD] focus:border-transparent outline-none transition-all" placeholder="+420 123 456 789" />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label htmlFor="message" className="block text-sm font-medium text-gray-700 mb-1">S čím Vám můžeme pomoci?</label>
                                                    <textarea id="message" rows="4" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#01ABBD] focus:border-transparent outline-none transition-all resize-none" placeholder="Rád bych probral možnosti investování..."></textarea>
                                                </div>
                                                <button type="submit" disabled={formStatus === 'submitting'} className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${formStatus === 'submitting' ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-[#F9E900] text-[#080708] hover:bg-[#e5d600] shadow-md shadow-[#F9E900]/20'}`}>
                                                    {formStatus === 'submitting' ? 'Odesílám...' : 'Odeslat zprávu'}
                                                </button>
                                                <p className="text-xs text-gray-400 text-center mt-4">
                                                    Odesláním souhlasíte se zpracováním osobních údajů pro účely zpětného kontaktování.
                                                </p>
                                            </form>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                                        <a href="https://www.facebook.com/profile.php?id=61581703097962" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-[#01ABBD] hover:text-white transition-colors"><Facebook size={20} /></a>
                                        <a href="https://www.instagram.com/kluci_z_financi/" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-[#01ABBD] hover:text-white transition-colors"><Instagram size={20} /></a>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="pt-8 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center">
                                <p className="text-gray-500 text-sm mb-4 md:mb-0">
                                    © {new Date().getFullYear()} Kluci z financí. Všechna práva vyhrazena.
